<!DOCTYPE html>
<html class="staticrypt-html" lang="en">

        <meta charset="utf-8" />
        <title>Existing Conditions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com">

        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <style>
            :root {
                /* SE brand palette (from the official dot logo) */
                --se-indigo-600: #4F46E5; /* #4F46E5 */
                --se-indigo-500: #6366F1;
                --se-indigo-200: #C7D2FE;
                --se-indigo-50: #EEF2FF;
                --se-indigo-hover: #4338CA;
                --se-gray-700: #374151;
                --se-slate-50: #F8FAFC;
                --se-slate-100: #F1F5F9;
                --se-slate-200: #E2E8F0;
                --se-slate-400: #94A3B8;
                --se-slate-500: #64748B;
                --se-slate-700: #334155;
                --se-slate-900: #0F172A;
                --se-indigo: var(--se-indigo-600);
            }

            *, *::before, *::after { box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                color: var(--se-slate-900);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                background:
                    radial-gradient(1200px 600px at 90% -10%, rgba(79, 70, 229, 0.12), transparent 60%),
                    radial-gradient(900px 500px at -10% 110%, rgba(79, 70, 229, 0.08), transparent 60%),
                    var(--se-slate-50);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 48px 24px;
            }

            .se-card {
                width: 100%;
                max-width: 420px;
                background: #ffffff;
                border: 1px solid var(--se-slate-200);
                border-radius: 16px;
                box-shadow:
                    0 1px 2px rgba(15, 23, 42, 0.04),
                    0 12px 32px rgba(15, 23, 42, 0.08);
                padding: 40px;
            }

            .se-brand {
                display: flex;
                align-items: center;
                gap: 14px;
                margin-bottom: 28px;
            }

            .se-logo-mark {
                width: 36px;
                height: 36px;
                flex-shrink: 0;
                display: block;
            }

            .se-brand-text {
                display: flex;
                flex-direction: column;
                line-height: 1.2;
            }
            .se-brand-name {
                font-size: 15px;
                font-weight: 600;
                color: var(--se-slate-900);
                letter-spacing: -0.01em;
            }
            .se-brand-product {
                font-size: 12px;
                color: var(--se-slate-500);
                font-weight: 500;
                margin-top: 2px;
            }

            .se-title {
                font-size: 22px;
                font-weight: 600;
                letter-spacing: -0.02em;
                color: var(--se-slate-900);
                margin: 0 0 6px;
            }

            .se-subtitle {
                font-size: 14px;
                color: var(--se-slate-500);
                margin: 0 0 28px;
                line-height: 1.5;
            }

            .se-field-label {
                display: block;
                font-size: 13px;
                font-weight: 500;
                color: var(--se-slate-700);
                margin-bottom: 6px;
            }

            .staticrypt-password-container {
                position: relative;
                margin-bottom: 16px;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                padding: 12px 44px 12px 14px;
                font-family: inherit;
                font-size: 15px;
                color: var(--se-slate-900);
                background: #fff;
                border: 1px solid var(--se-slate-200);
                border-radius: 8px;
                outline: none;
                transition: border-color 0.15s, box-shadow 0.15s;
            }

            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: var(--se-indigo);
                box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
            }

            .staticrypt-form input::placeholder { color: var(--se-slate-400); }

            .staticrypt-toggle-password-visibility {
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                opacity: 0.55;
                cursor: pointer;
                transition: opacity 0.15s;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 1; }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                color: var(--se-slate-700);
                margin-bottom: 20px;
                cursor: pointer;
            }
            .staticrypt-remember input[type="checkbox"] {
                width: 16px;
                height: 16px;
                accent-color: var(--se-indigo);
                margin: 0;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                padding: 12px 16px;
                background: var(--se-indigo);
                color: #fff;
                font-family: inherit;
                font-size: 15px;
                font-weight: 600;
                letter-spacing: 0.01em;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.15s, transform 0.05s;
                box-shadow: 0 1px 2px rgba(79, 70, 229, 0.25);
            }
            .staticrypt-form .staticrypt-decrypt-button:hover { background: var(--se-indigo-hover); }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: translateY(1px); }
            .staticrypt-form .staticrypt-decrypt-button:focus-visible {
                outline: none;
                box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.35);
            }

            .se-footer {
                margin-top: 24px;
                padding-top: 20px;
                border-top: 1px solid var(--se-slate-200);
                font-size: 12px;
                color: var(--se-slate-500);
                line-height: 1.5;
            }
            .se-footer a {
                color: var(--se-indigo);
                text-decoration: none;
                font-weight: 500;
            }
            .se-footer a:hover { text-decoration: underline; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--se-slate-50);
            }
            .staticrypt-spinner {
                width: 2rem;
                height: 2rem;
                border: 0.25em solid var(--se-slate-200);
                border-right-color: var(--se-indigo);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }

            .hidden { display: none !important; }

            @media screen and (max-width: 480px) {
                .se-card { padding: 28px 24px; border-radius: 12px; }
                .se-title { font-size: 20px; }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
        </style>
    </head>
