name: Encrypt + Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify password secret is set
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "STATICRYPT_PASSWORD repo secret is missing — add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Encrypt index.src.html with StatiCrypt (SE-branded login)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          mkdir -p _site
          npx --yes staticrypt index.src.html \
            -p "$STATICRYPT_PASSWORD" \
            --template login_template.html \
            --template-color-primary '#4F46E5' \
            --template-color-secondary '#F8FAFC' \
            --template-title 'Existing Conditions' \
            --template-instructions 'Enter your access password to view the prototype dashboard.' \
            --template-button 'Unlock dashboard' \
            --template-placeholder 'Access password' \
            --template-error 'Incorrect password — please try again.' \
            -d _staticrypt_out
          cp _staticrypt_out/index.src.html _site/index.html

      - name: Encrypt index_v4.html with StatiCrypt (v4 preview at /v2/)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx --yes staticrypt index_v4.html \
            -p "$STATICRYPT_PASSWORD" \
            --template login_template.html \
            --template-color-primary '#4F46E5' \
            --template-color-secondary '#F8FAFC' \
            --template-title 'Existing Conditions (v4 preview)' \
            --template-instructions 'Enter your access password to view the v4 prototype.' \
            --template-button 'Unlock dashboard' \
            --template-placeholder 'Access password' \
            --template-error 'Incorrect password — please try again.' \
            -d _staticrypt_v2_out
          mkdir -p _site/v2
          cp _staticrypt_v2_out/index_v4.html _site/v2/index.html

      - name: Encrypt index_v5.html with StatiCrypt (v5 preview at /v3/)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx --yes staticrypt index_v5.html \
            -p "$STATICRYPT_PASSWORD" \
            --template login_template.html \
            --template-color-primary '#4F46E5' \
            --template-color-secondary '#F8FAFC' \
            --template-title 'Existing Conditions (v5 — table library)' \
            --template-instructions 'Enter your access password to view the v5 prototype with the user table library.' \
            --template-button 'Unlock dashboard' \
            --template-placeholder 'Access password' \
            --template-error 'Incorrect password — please try again.' \
            -d _staticrypt_v3_out
          mkdir -p _site/v3
          cp _staticrypt_v3_out/index_v5.html _site/v3/index.html

      - name: Encrypt tenancy_prototype.html with StatiCrypt (v6 shell at /v6/)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx --yes staticrypt tenancy_prototype.html \
            -p "$STATICRYPT_PASSWORD" \
            --template login_template.html \
            --template-color-primary '#4F46E5' \
            --template-color-secondary '#F8FAFC' \
            --template-title 'Existing Conditions (v6 — projects shell)' \
            --template-instructions 'Enter your access password to view the v6 projects + saved work shell.' \
            --template-button 'Unlock dashboard' \
            --template-placeholder 'Access password' \
            --template-error 'Incorrect password — please try again.' \
            -d _staticrypt_v6_shell_out
          mkdir -p _site/v6
          cp _staticrypt_v6_shell_out/tenancy_prototype.html _site/v6/index.html

      - name: Encrypt index_v6.html with StatiCrypt (v6 dashboard at /v6/index_v6.html)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx --yes staticrypt index_v6.html \
            -p "$STATICRYPT_PASSWORD" \
            --template login_template.html \
            --template-color-primary '#4F46E5' \
            --template-color-secondary '#F8FAFC' \
            --template-title 'Existing Conditions (v6 — dashboard)' \
            --template-instructions 'Enter your access password to view the v6 analysis dashboard.' \
            --template-button 'Unlock dashboard' \
            --template-placeholder 'Access password' \
            --template-error 'Incorrect password — please try again.' \
            -d _staticrypt_v6_dash_out
          mkdir -p _site/v6
          cp _staticrypt_v6_dash_out/index_v6.html _site/v6/index_v6.html

      - name: Encrypt tenancy_v7.html with StatiCrypt (v7 shell at /v7/)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx --yes staticrypt tenancy_v7.html \
            -p "$STATICRYPT_PASSWORD" \
            --template login_template.html \
            --template-color-primary '#4F46E5' \
            --template-color-secondary '#F8FAFC' \
            --template-title 'Existing Conditions (v7 — projects shell)' \
            --template-instructions 'Enter your access password to view the v7 projects + saved work shell.' \
            --template-button 'Unlock dashboard' \
            --template-placeholder 'Access password' \
            --template-error 'Incorrect password — please try again.' \
            -d _staticrypt_v7_shell_out
          mkdir -p _site/v7
          cp _staticrypt_v7_shell_out/tenancy_v7.html _site/v7/index.html

      - name: Encrypt index_v7.html with StatiCrypt (v7 dashboard at /v7/index_v7.html)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx --yes staticrypt index_v7.html \
            -p "$STATICRYPT_PASSWORD" \
            --template login_template.html \
            --template-color-primary '#4F46E5' \
            --template-color-secondary '#F8FAFC' \
            --template-title 'Existing Conditions (v7 — dashboard)' \
            --template-instructions 'Enter your access password to view the v7 analysis dashboard.' \
            --template-button 'Unlock dashboard' \
            --template-placeholder 'Access password' \
            --template-error 'Incorrect password — please try again.' \
            -d _staticrypt_v7_dash_out
          mkdir -p _site/v7
          cp _staticrypt_v7_dash_out/index_v7.html _site/v7/index_v7.html

      - name: Encrypt index_v8.html with StatiCrypt (v8 embedded-maps preview at /v8/)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx --yes staticrypt index_v8.html \
            -p "$STATICRYPT_PASSWORD" \
            --template login_template.html \
            --template-color-primary '#4F46E5' \
            --template-color-secondary '#F8FAFC' \
            --template-title 'Existing Conditions (v8 — embedded maps preview)' \
            --template-instructions 'Enter your access password to view the v8 embedded-maps preview.' \
            --template-button 'Unlock dashboard' \
            --template-placeholder 'Access password' \
            --template-error 'Incorrect password — please try again.' \
            -d _staticrypt_v8_out
          mkdir -p _site/v8
          cp _staticrypt_v8_out/index_v8.html _site/v8/index.html

      - name: Stage static assets
        run: |
          cp .nojekyll _site/.nojekyll
          cp robots.txt _site/robots.txt
          mkdir -p _site/data
          cp -R data/. _site/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
