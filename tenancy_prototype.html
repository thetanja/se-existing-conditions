// ============================================================
// CROSS-PROTOTYPE SYNC — pull v6 saves from localStorage
// ============================================================
// v6 (index_v6.html) saves analyses + templates to localStorage. We read those
// keys here and splice the saves into the in-memory mock state so the user
// sees their v6 saves alongside the seed demo data. Re-runs on every render
// (cheap), plus a `storage` event listener for live cross-tab sync.
const V6_ANALYSES_KEY  = 'seec.savedAnalyses';
const V6_TEMPLATES_KEY = 'seec.userTemplates';

function loadV6Analyses()  { try { return JSON.parse(localStorage.getItem(V6_ANALYSES_KEY)  || '[]'); } catch (e) { return []; } }
function loadV6Templates() { try { return JSON.parse(localStorage.getItem(V6_TEMPLATES_KEY) || '[]'); } catch (e) { return []; } }

// Convert a v6 saved analysis (rich shape) → tenancy artifact (lean shape).
function v6AnalysisToArtifact(a) {
  const targetLabel = a.target?.label || a.target?.name || a.target?.fips || 'Unknown';
  const userTemplateId = (a.templateId && a.templateId.startsWith('utmpl_')) ? a.templateId : null;
  return {
    id: a.id,
    type: 'analysis',
    name: a.name,
    target: targetLabel,
    userTemplateId,
    createdAt: a.createdAt,
    parentArtifactId: a.parentAnalysisId || null,
    lastRunVintages: a.lastRunVintages || {},
    _fromV6: true
  };
}
// Convert a v6 saved template → tenancy USER_TEMPLATES row.
function v6TemplateToTenancy(t) {
  return {
    id: t.id,
    name: t.name,
    ownerUserId: state.currentUserId,        // attribute to whoever is "viewing as"
    visibility: t.visibility || 'private',
    parentTemplateId: t.parentTemplateId || 'system_existing_conditions_v1',
    description: t.description || '',
    updatedAt: t.updatedAt,
    _fromV6: true
  };
}

function syncFromV6() {
  // Group v6 analyses by projectId
  const byProject = {};
  for (const a of loadV6Analyses()) {
    if (!a.projectId) continue;             // standalone (no project) — not surfaced in tenancy
    (byProject[a.projectId] ||= []).push(v6AnalysisToArtifact(a));
  }
  // Rebuild each project's artifacts: seed items + v6 items (avoids duplicates on re-render)
  for (const p of PROJECTS) {
    const seed   = p.artifacts.filter(a => !a._fromV6);
    const v6Adds = byProject[p.id] || [];
    p.artifacts = [...seed, ...v6Adds];
  }
  // Rebuild USER_TEMPLATES the same way
  const seedTemplates = USER_TEMPLATES.filter(t => !t._fromV6);
  const v6Templates   = loadV6Templates().map(v6TemplateToTenancy);
  USER_TEMPLATES.length = 0;
  USER_TEMPLATES.push(...seedTemplates, ...v6Templates);
}

function currentUser() { return USERS[state.currentUserId]; }
function visibleProjects(forUserId) {
  const uid = forUserId || state.currentUserId;
  return PROJECTS.filter(p => {
    if (p.deletedAt) return false;
    return p.members.some(m => m.userId === uid);
  });
}
function projectRole(project, uid) {
  const m = project.members.find(x => x.userId === uid);
  return m ? m.role : null;
}
function visibleUserTemplates() {
  const uid = state.currentUserId;
  return USER_TEMPLATES.filter(t => {
    if (t.visibility === 'org') return true;          // visible to everyone in the org
    return t.ownerUserId === uid;                      // private: only the owner sees it
  });
}
function visibleSavedViews() {
  const uid = state.currentUserId;
  return SAVED_VIEWS.filter(v => v.visibility === 'org' || v.ownerUserId === uid);
}
// How many threads in this project have a stale latest? Used by the project card.
function countStaleThreads(project) {
  if (project.archivedAt) return 0;
  const groups = new Map();
  for (const a of project.artifacts) {
    const key = `${a.type}|${a.target}|${a.userTemplateId || ''}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(a);
  }
  let n = 0;
  for (const arr of groups.values()) {
    const sorted = arr.slice().sort((x, y) => new Date(y.createdAt) - new Date(x.createdAt));
    if (staleSurveys(sorted[0]).length > 0) n++;
  }
  return n;
}

// Sort helper. "Most stale" surfaces the projects that need attention first —
// the planner-relevant default; trumps last-updated for at-a-glance triage.
function sortProjects(arr, mode) {
  const copy = arr.slice();
  if (mode === 'most_stale') {
    return copy.sort((a, b) => {
      const sa = countStaleThreads(a);
      const sb = countStaleThreads(b);
      if (sa !== sb) return sb - sa; // more stale first
      return new Date(b.updatedAt) - new Date(a.updatedAt); // tiebreak by recency
    });
  }
  if (mode === 'last_updated') return copy.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  if (mode === 'due_date') {
    return copy.sort((a, b) => {
      const da = a.engagement.dueDate ? new Date(a.engagement.dueDate).getTime() : Infinity;
      const db = b.engagement.dueDate ? new Date(b.engagement.dueDate).getTime() : Infinity;
      return da - db;
    });
  }
  if (mode === 'name') return copy.sort((a, b) => a.name.localeCompare(b.name));
  return copy;
}

function renderStatusPill(status, archived) {
  if (archived) return `<span class="pill pill-slate">Archived</span>`;
  const map = {
    in_progress: ['pill-indigo', 'In progress'],
    review:      ['pill-amber',  'In review'],
    submitted:   ['pill-emerald','Submitted'],
    closed:      ['pill-slate',  'Closed']
  };
  const [cls, label] = map[status] || ['pill-slate', status];
  return `<span class="pill ${cls}">${label}</span>`;
}

function formatRelative(dateStr) {
  const then = new Date(dateStr);
  const now = new Date();
  const diff = (now - then) / 1000;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  if (diff < 86400 * 7) return `${Math.floor(diff / 86400)}d ago`;
  return then.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Group artifacts into threads: each thread = artifacts sharing (type, target, userTemplateId).
// Render only the latest of each thread at top level; older runs collapse into a
// <details> block under the latest card.
function renderThreadedArtifacts(artifacts, project) {
  const groups = new Map();
  for (const a of artifacts) {
    const key = `${a.type}|${a.target}|${a.userTemplateId || ''}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(a);
  }

  // Sort threads by their latest artifact (most recent thread first)
  const threads = [...groups.values()]
    .map(arr => arr.slice().sort((x, y) => new Date(y.createdAt) - new Date(x.createdAt)))
    .sort((t1, t2) => new Date(t2[0].createdAt) - new Date(t1[0].createdAt));

  return threads.map(t => {
    const latest = t[0];
    const older = t.slice(1);
    return `
      <div>
        ${renderArtifactRow(latest, project, t)}
        ${older.length ? `
          <details class="ml-6 mt-1 mb-1">
            <summary class="text-xs text-slate-500 hover:text-slate-700 cursor-pointer py-1.5 select-none">
              <span class="inline-block w-3">▸</span> ${older.length} earlier ${older.length === 1 ? 'version' : 'versions'} of this analysis
            </summary>
            <div class="border-l-2 border-slate-200 pl-3 mt-1 space-y-1">
              ${older.map((a, i) => renderOlderVersionRow(a, t.length - 1 - i, t.length)).join('')}
            </div>
          </details>
        ` : ''}
      </div>`;
  }).join('');
}

// Returns the list of surveys whose lastRunVintage on this artifact is older
// than the current registry. Used only on the latest of a thread (production
// would skip older artifacts because they're already superseded).
function staleSurveys(artifact) {
  if (!artifact.lastRunVintages) return [];
  const out = [];
  for (const survey of Object.keys(artifact.lastRunVintages)) {
    const cur = CURRENT_VINTAGES[survey];
    const run = artifact.lastRunVintages[survey];
    if (cur && run && cur !== run) {
      out.push({ key: survey, name: VINTAGE_DISPLAY_NAMES[survey] || survey, current: cur, ran: run });
    }
  }
  return out;
}
function renderStalePill(stale) {
  const tooltip = stale.map(s => `${s.name}: ran ${s.ran} → ${s.current} available`).join(' · ');
  if (stale.length === 1) {
    const s = stale[0];
    const yr = (s.current.match(/\d{4}/) || [''])[0];
    return `<span class="pill pill-amber text-[10px]" title="${tooltip}">↻ ${s.name}${yr ? ' ' + yr : ''} available</span>`;
  }
  return `<span class="pill pill-amber text-[10px]" title="${tooltip}">↻ ${stale.length} newer vintages available</span>`;
}

// ---------- Save Analysis modal ----------
// Triggered from v5 in production. The prototype mocks the modal so you can
// see the flow: name + project picker + threading hint + optional view-save.
function openSaveAnalysisModal(opts = {}) {
  const uid = state.currentUserId;
  const writable = PROJECTS.filter(p =>
    !p.archivedAt && !p.deletedAt &&
    p.members.some(m => m.userId === uid && (m.role === 'owner' || m.role === 'contributor'))
  );
  // Pre-select project: if launched from a project, use it; else pick first writable
  const preselectedId = opts.projectId || (writable[0] && writable[0].id) || '';
  // Mock target + template — would come from v5 session state in production
  const mockTarget = opts.targetLabel || 'Burlington, VT';
  const mockTemplateId = opts.userTemplateId || 'utmpl_burlington_council';
  const mockTemplate = USER_TEMPLATES.find(t => t.id === mockTemplateId);
  const mockTemplateName = mockTemplate ? mockTemplate.name : 'Existing Conditions (system)';

  // Threading hint — count existing artifacts with same (target, userTemplateId) in the chosen project
  const threadingHint = (projectId) => {
    const p = PROJECTS.find(x => x.id === projectId);
    if (!p) return '';
    const matching = p.artifacts.filter(a =>
      a.type === 'analysis' && a.target === mockTarget && (a.userTemplateId || null) === (mockTemplateId || null)
    );
    if (matching.length === 0) return `<span class="text-slate-500">First analysis with this target + template combination in this project.</span>`;
    return `<span class="text-indigo-700">↪ Will join the existing thread of ${matching.length} ${matching.length === 1 ? 'analysis' : 'analyses'} with the same target + template — saves as version ${matching.length + 1}.</span>`;
  };

  const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const suggestedName = `${mockTarget.split(',')[0]} — ${today} run`;

  function modalHtml(currentProjectId) {
    return `
      <div class="fixed inset-0 modal-backdrop z-40 flex items-center justify-center p-4" onclick="closeModal(event)">
        <div onclick="event.stopPropagation()" class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[92vh] overflow-y-auto">
          <div class="p-6 border-b border-slate-200">
            <h2 class="text-xl font-semibold text-slate-900">📊 Save analysis</h2>
            <p class="text-sm text-slate-500 mt-1">Persist this profile as a saved record bound to a project.</p>
          </div>

          <div class="p-6 space-y-5">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Name <span class="text-rose-600">*</span></label>
              <input type="text" value="${suggestedName}" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
            </div>

            <div class="grid grid-cols-2 gap-4 p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs text-slate-600">
              <div><span class="text-slate-500">Target:</span> <strong class="text-slate-900">${mockTarget}</strong></div>
              <div><span class="text-slate-500">Template:</span> <strong class="text-slate-900">${mockTemplateName}</strong></div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Save to project <span class="text-rose-600">*</span></label>
              <select id="save-analysis-project" onchange="document.getElementById('thread-hint').innerHTML = (${JSON.stringify(writable.map(p => [p.id, threadingHint(p.id)]))}.find(x => x[0] === this.value) || ['', ''])[1]" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                ${writable.map(p => `<option value="${p.id}" ${p.id === currentProjectId ? 'selected' : ''}>${p.name}</option>`).join('')}
                <option disabled>──────────</option>
                <option value="__new__">+ Create new project…</option>
              </select>
              <div id="thread-hint" class="text-xs mt-1.5">${threadingHint(currentProjectId)}</div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Notes <span class="text-slate-400">(optional)</span></label>
              <textarea rows="2" maxlength="280" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Anything specific about this run that future-you should remember"></textarea>
            </div>

            <label class="flex items-start gap-2 px-2 py-1 cursor-pointer">
              <input type="checkbox" class="mt-0.5 rounded text-indigo-600" />
              <span class="text-sm text-slate-700">
                Also save target + comparison as a view named <strong>"${mockTarget} — ${mockTemplateName.split('—')[0].trim()}"</strong>
                <span class="block text-xs text-slate-500 mt-0.5">For re-use across analyses. Lands in Saved Work → Saved views.</span>
              </span>
            </label>
          </div>

          <div class="p-4 border-t border-slate-200 flex items-center justify-end gap-2 bg-slate-50 rounded-b-xl">
            <button onclick="closeModalById()" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded">Cancel</button>
            <button onclick="closeModalById();toast('Saved to project. Would redirect to the project Artifacts tab with the new entry highlighted.')" class="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded hover:bg-indigo-700">Save analysis</button>
          </div>
        </div>
      </div>`;
  }

  document.getElementById('modal-root').innerHTML = modalHtml(preselectedId);
}

              <strong>Forking:</strong> This will create a new private template with your additional customizations on top of <strong>${baseTemplate.name}</strong>. The original template stays unchanged. If ${USERS[baseTemplate.ownerUserId]?.displayName || 'the original owner'} updates it later, your variant won't auto-update.
            </div>
          ` : ''}
        </div>

        <div class="p-4 border-t border-slate-200 flex items-center justify-end gap-2 bg-slate-50 rounded-b-xl">
          <button onclick="closeModalById()" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded">Cancel</button>
          <button onclick="closeModalById();toast('Template saved. Find it in Saved Work → User templates.')" class="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded hover:bg-indigo-700">Save template</button>
        </div>
      </div>
    </div>`;
}

function openAddMembersModal(projectId) {
  const p = PROJECTS.find(x => x.id === projectId);
  const current = new Set(p.members.map(m => m.userId));
  const available = Object.values(USERS).filter(u => !current.has(u.id));
  document.getElementById('modal-root').innerHTML = `
    <div class="fixed inset-0 modal-backdrop z-40 flex items-center justify-center p-4" onclick="closeModal(event)">
      <div onclick="event.stopPropagation()" class="bg-white rounded-xl shadow-2xl max-w-md w-full">
        <div class="p-6 border-b border-slate-200">
          <h2 class="text-xl font-semibold text-slate-900">Add members</h2>
          <p class="text-sm text-slate-500 mt-1">to ${p.name}</p>
        </div>
        <div class="p-6">
          ${available.length === 0 ? `<div class="text-sm text-slate-500">Everyone in your org is already on this project.</div>` : `
            <div class="space-y-1">
              ${available.map(u => `
                <label class="flex items-center gap-2 px-2 py-2 hover:bg-slate-50 rounded">
                  <input type="checkbox" class="rounded text-indigo-600" />
                  <div class="avatar ${u.avatarClass}">${u.initials}</div>
                  <div class="flex-1">
                    <div class="text-sm font-medium">${u.displayName}</div>
                    <div class="text-xs text-slate-500">${u.email}</div>
                  </div>
                  <select class="text-xs border border-slate-200 rounded px-1.5 py-0.5">
                    <option>contributor</option>
                    <option>reviewer</option>
                  </select>
                </label>`).join('')}
            </div>
          `}
        </div>
        <div class="p-4 border-t border-slate-200 flex items-center justify-end gap-2 bg-slate-50 rounded-b-xl">
          <button onclick="closeModalById()" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded">Cancel</button>
          <button onclick="closeModalById();toast('Would add members + send invitation emails')" class="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded hover:bg-indigo-700">Add</button>
        </div>
      </div>
    </div>`;
}

function closeModal(e) { if (e.target === e.currentTarget) closeModalById(); }
function closeModalById() { document.getElementById('modal-root').innerHTML = ''; }

// ============================================================
// HANDLERS
// ============================================================

function setView(v) { state.view = v; if (v !== 'project') state.currentProjectId = null; render(); }
function closeSwitcher() { const d = document.getElementById('proj-switcher'); if (d) d.removeAttribute('open'); }
function openProject(id) { state.currentProjectId = id; state.view = 'project'; render(); }
function goToProjects() { state.view = 'projects'; state.currentProjectId = null; render(); }
function setLibraryTab(t) { state.libraryTab = t; render(); }
function setShowArchived(b) { state.showArchived = b; render(); }
function setProjectSort(s) { state.projectSort = s; render(); }

// Open v6 (the analysis-creation prototype with wired Save flows) in a new tab.
// In production this would receive the project context as URL params so the
// resulting saved analysis lands in the right project. v6 has the Save analysis
// and Save as template modals wired to the buttons.
// Build a v6 URL with optional context (template, project, view).
// v6 reads these on load and applies them via applyInboundV6Params().
function buildV6Url(opts) {
  const params = new URLSearchParams();
  if (opts && opts.template) params.set('template', opts.template);
  if (opts && opts.project)  params.set('project',  opts.project);
  if (opts && opts.view)     params.set('view',     opts.view);
  const qs = params.toString();
  return 'index_v6.html' + (qs ? '?' + qs : '');
}

function openV6(context, opts) {
  toast(`Opening v6 input panel — ${context}. Save analysis lands here automatically.`);
  window.open(buildV6Url(opts), '_blank');
}
function useSavedView(viewId) {
  const v = SAVED_VIEWS.find(x => x.id === viewId);
  if (!v) return;
  // Saved views bundle target + comparison + (optional) template. Target/comparison
  // payload is too big for a URL param, so stash it in localStorage under a
  // generated handoff key; pass the key as ?handoff=<key>. v6 picks it up on
  // load and deletes the key. sessionStorage is per-tab, so we can't use it
  // for the cross-tab open('_blank') handoff — must be localStorage.
  const handoffKey = 'v6Handoff_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  const payload = { target: v.target, comparison: v.comparison, templateId: v.templateId || null, savedViewId: v.id };
  try { localStorage.setItem(handoffKey, JSON.stringify(payload)); } catch (e) { /* localStorage may be full or disabled; v6 will fall through to default */ }
  toast(`Opening v6 with target=${v.target.label} + ${v.comparison.length} comparison columns →`);
  const params = new URLSearchParams();
  params.set('handoff', handoffKey);
  if (v.templateId) params.set('template', v.templateId);
  if (state.currentProjectId) params.set('project', state.currentProjectId);
  window.open('index_v6.html?' + params.toString(), '_blank');
}
function useTemplate(tmplId) {
  const t = USER_TEMPLATES.find(x => x.id === tmplId);
  if (!t) return;
  toast(`Opening v6 with "${t.name}" applied as the user-template overlay →`);
  window.open(buildV6Url({ template: tmplId, project: state.currentProjectId || undefined }), '_blank');
}
function quickNewAnalysis() {
  const writable = visibleProjects().filter(p => !p.archivedAt && (() => { const r = projectRole(p, state.currentUserId); return r === 'owner' || r === 'contributor'; })());
  if (writable.length === 0) { toast('No projects you can write to. Create one first.'); return; }
  if (writable.length === 1) { openV6('project: ' + writable[0].name, { project: writable[0].id }); return; }
  document.getElementById('modal-root').innerHTML = `
    <div class="fixed inset-0 modal-backdrop z-40 flex items-center justify-center p-4" onclick="closeModal(event)">
      <div onclick="event.stopPropagation()" class="bg-white rounded-xl shadow-2xl max-w-md w-full">
        <div class="p-5 border-b border-slate-200">
          <h2 class="text-lg font-semibold text-slate-900">New analysis</h2>
          <p class="text-xs text-slate-500 mt-1">Pick a project to save into. Opens v6 to generate.</p>
        </div>
        <div class="p-2 max-h-80 overflow-y-auto">
          ${writable.map(p => `
            <button onclick="closeModalById();openV6(${JSON.stringify('project: ' + p.name).replace(/"/g, '&quot;')}, ${JSON.stringify({ project: p.id }).replace(/"/g, '&quot;')})" class="w-full text-left px-3 py-2.5 hover:bg-slate-50 rounded flex items-start gap-2">
              <span class="text-slate-400 text-xs mt-0.5">📁</span>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium text-slate-900 truncate">${p.name}</div>
                <div class="text-xs text-slate-500 truncate">${p.homeTarget.label}</div>
              </div>
            </button>`).join('')}
        </div>
      </div>
    </div>`;
}

function archiveProject(id) {
  const p = PROJECTS.find(x => x.id === id);
  if (confirm(`Archive "${p.name}"? It will move out of the active list. Reversible.`)) {
    p.archivedAt = new Date().toISOString();
    closeModalById();
    toast('Project archived. Find it under the Archived filter.');
    render();
  }
}
function restoreProject(id) {
  const p = PROJECTS.find(x => x.id === id);
  p.archivedAt = null;
  closeModalById();
  toast('Project restored.');
  render();
}
function deleteProject(id) {
  const p = PROJECTS.find(x => x.id === id);
  if (confirm(`Soft-delete "${p.name}"? All ${p.artifacts.length} artifacts go with it. Recoverable for 30 days by Org Admin.`)) {
    p.deletedAt = new Date().toISOString();
    closeModalById();
    toast('Project soft-deleted (30-day retention).');
    goToProjects();
  }
}

function toggleVisibility(tmplId) {
  const t = USER_TEMPLATES.find(x => x.id === tmplId);
  if (t.ownerUserId !== state.currentUserId) { toast('Only the template owner can change its visibility.'); return; }
  t.visibility = t.visibility === 'org' ? 'private' : 'org';
  toast(t.visibility === 'org'
    ? `"${t.name}" is now visible to everyone in ${ORG.displayName}. Your future edits propagate to anyone using it.`
    : `"${t.name}" is now private. Others who applied it before keep their copy unchanged unless they re-apply.`);
  render();
}
function toggleSavedViewVisibility(viewId) {
  const v = SAVED_VIEWS.find(x => x.id === viewId);
  if (v.ownerUserId !== state.currentUserId) { toast('Only the view owner can change its visibility.'); return; }
  v.visibility = v.visibility === 'org' ? 'private' : 'org';
  toast(v.visibility === 'org'
    ? `"${v.name}" is now visible to everyone in ${ORG.displayName}.`
    : `"${v.name}" is now private.`);
  render();
}

function toast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2.5 bg-slate-900 text-white text-sm rounded-lg shadow-lg z-50';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.transition = 'opacity 0.3s'; el.style.opacity = '0'; }, 2400);
}

// ============================================================
// NAV WIRING
// ============================================================

document.querySelectorAll('.nav-btn').forEach(b => {
  b.addEventListener('click', () => setView(b.dataset.view));
});
document.getElementById('user-switcher').addEventListener('change', (e) => {
  state.currentUserId = e.target.value;
  state.view = 'projects';
  state.currentProjectId = null;
  render();
});

// Honor ?view=library | ?view=projects | ?project=<id> from inbound links
// (e.g. v6's "Open in Saved Work" button passes ?view=library).
(function applyInboundParams() {
  try {
    const params = new URLSearchParams(window.location.search);
    const v = params.get('view');
    const pid = params.get('project');
    if (pid && PROJECTS.find(p => p.id === pid)) {
      state.currentProjectId = pid;
      state.view = 'project';
    } else if (v === 'library' || v === 'projects') {
      state.view = v;
    }
  } catch (e) { /* swallow — URL parsing is non-critical */ }
})();

render();

// Cross-tab + cross-window sync with v6:
// - `storage` event fires in this tab when v6 (in another tab) writes to localStorage
// - `focus` event re-renders when the user returns to this tab after using v6
window.addEventListener('storage', (e) => {
  if (e.key === V6_ANALYSES_KEY || e.key === V6_TEMPLATES_KEY) render();
});
window.addEventListener('focus', render);
</script>
